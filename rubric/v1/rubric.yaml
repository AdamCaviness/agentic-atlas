rubric_version: 1.1.0
title: Agentic Workflow Atlas Rubric
description: >
  Curated rubric of 13 axes. Sign conventions and weights are a proposal and are
  expected to change before this version is treated as stable. Any change that can
  move a score requires a MAJOR bump. See docs/versioning.md.

# Active axes, in display order (grouped: context, style, process, architecture,
# footprint). Each id maps to axes/<id>/axis.yaml.
axes:
  - greenfield-vs-brownfield
  - small-scope-vs-large-scope
  - prototype-vs-production
  - solo-vs-team
  - generalist-vs-specialist
  - fresh-vs-mature
  - interrogative-vs-opinionated
  - autonomous-vs-human-in-loop
  - spec-light-vs-spec-driven
  - test-optional-vs-test-first
  - single-agent-vs-multi-agent
  - prescriptive-vs-composable
  - lightweight-vs-heavyweight
