id: generalist-vs-specialist
title: Generalist vs Specialist
scale: 10
poles:
  negative: generalist
  positive: specialist
description: >
  How domain-focused the approach is. Negative means it targets any domain, from
  writing to business to wellness. Positive means it specializes in software delivery.
indicators:
  - id: gs1
    question: "Is it framed for any domain, or specifically for software engineering?"
    kind: classified
    weight: 3
    answers: { any_domain: -1.0, mostly_software: 0.5, software_only: 1.0 }
  - id: gs2
    question: "Does it explicitly claim applicability beyond code (business, writing, wellness)?"
    kind: classified
    weight: 1
    answers: { yes_broad: -1.0, some: 0.0, "no": 1.0 }
  - id: gs3
    question: "Density of software-specific vocabulary across docs and commands."
    kind: measured
    weight: 2
    signal:
      type: vocabulary
      terms: ["compile", "deploy", "unit test", "pull request", "refactor", "api", "repository"]
      bands:
        - { max_count: 1, value: -1.0 }
        - { max_count: 8, value: 0.3 }
        - { max_count: null, value: 1.0 }
