id: spec-light-vs-spec-driven
title: Spec-light vs Spec-driven
poles:
  negative: spec_light
  positive: spec_driven
description: >
  How much written specification precedes code. Negative means it jumps to
  implementation. Positive means it produces and follows a spec or plan first.
explain:
  negative: jumps straight to implementation, little written up front
  positive: writes and follows a spec or plan before coding
indicators:
  - id: sd1
    question: "Is a written spec, PRD, or plan required before implementation?"
    kind: classified
    weight: 3
    answers: { none: -0.8, encouraged: 0.24, required: 0.8 }
  - id: sd2
    question: "Are spec or plan artifacts produced and persisted (not just discussed)?"
    kind: classified
    weight: 2
    answers: { "no": -0.8, some: 0.24, "yes": 0.8 }
  - id: sd3
    question: "Density of specification vocabulary across docs and commands."
    kind: measured
    weight: 2
    signal:
      type: vocabulary
      terms: ["prd", "specification", "requirements", "acceptance criteria", "design doc", "plan", "spec"]
      bands:
        - { max_count: 1, value: -0.8 }
        - { max_count: 8, value: 0.24 }
        - { max_count: null, value: 0.8 }
