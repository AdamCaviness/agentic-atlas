id: small-scope-vs-large-scope
title: Small-scope vs Large-scope
poles:
  negative: small_scope
  positive: large_scope
description: >
  How much of the delivery lifecycle the approach covers. Negative means a single
  focused task. Positive means the whole lifecycle from idea to release.
explain:
  negative: one focused task
  positive: the whole delivery lifecycle, from idea to release
indicators:
  - id: sl1
    question: "How many lifecycle phases does it cover (idea, spec, plan, implement, test, review, release)?"
    kind: classified
    weight: 3
    answers: { one: -0.8, few: -0.24, most: 0.48, full_lifecycle: 0.8 }
  - id: sl2
    question: "Is it invoked as a single command or skill, or as a multi-stage pipeline?"
    kind: classified
    weight: 2
    answers: { single: -0.8, mixed: 0.0, multi_stage: 0.8 }
  - id: sl3
    question: "Density of lifecycle vocabulary across docs and commands."
    kind: measured
    weight: 2
    signal:
      type: vocabulary
      terms: ["requirements", "architecture", "deployment", "release", "retrospective", "epic", "milestone"]
      bands:
        - { max_count: 1, value: -0.8 }
        - { max_count: 8, value: 0.24 }
        - { max_count: null, value: 0.8 }
