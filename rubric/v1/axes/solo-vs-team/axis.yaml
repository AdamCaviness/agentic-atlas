id: solo-vs-team
title: Solo vs Team
scale: 10
poles:
  negative: solo
  positive: team
description: >
  Who the workflow is built for. Negative means a single developer working alone.
  Positive means multiple contributors, with team-safe collaboration and handoffs.
indicators:
  - id: st1
    question: "Does it provide team-safe collaboration (claiming or assigning work, avoiding conflicts between contributors)?"
    kind: classified
    weight: 3
    answers: { none: -1.0, partial: 0.2, strong: 1.0 }
  - id: st2
    question: "Are there defined handoffs between people or human reviewers?"
    kind: classified
    weight: 2
    answers: { none: -1.0, some: 0.3, many: 1.0 }
  - id: st3
    question: "Density of team-collaboration vocabulary across docs and commands."
    kind: measured
    weight: 2
    signal:
      type: vocabulary
      terms: ["team", "assign", "reviewer", "pull request", "collaborate", "stakeholder", "handoff"]
      bands:
        - { max_count: 1, value: -1.0 }
        - { max_count: 8, value: 0.3 }
        - { max_count: null, value: 1.0 }
