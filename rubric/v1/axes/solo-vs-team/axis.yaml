id: solo-vs-team
title: Solo vs Team
poles:
  negative: solo
  positive: team
description: >
  Who the approach is built for. Negative means a single developer working alone.
  Positive means multiple contributors, with team-safe collaboration and handoffs.
explain:
  negative: built for one developer working alone
  positive: built for many contributors, with team-safe collaboration and handoffs
indicators:
  - id: st1
    question: "Does it provide team-safe collaboration (claiming or assigning work, avoiding conflicts between contributors)?"
    kind: classified
    weight: 3
    answers: { none: -1.0, partial: 0.2, strong: 1.0 }
  - id: st2
    question: "Are there defined handoffs between people or human reviewers?"
    kind: classified
    weight: 2
    answers: { none: -1.0, some: 0.3, many: 1.0 }
  - id: st3
    question: "Density of team-collaboration vocabulary across docs and commands."
    kind: measured
    weight: 2
    signal:
      type: vocabulary
      terms: ["team", "assign", "reviewer", "pull request", "collaborate", "stakeholder", "handoff"]
      bands:
        - { max_count: 1, value: -0.8 }
        - { max_count: 8, value: 0.24 }
        - { max_count: null, value: 0.8 }
  - id: st4
    question: "Presence of team and CI infrastructure (workflows, code owners, PR templates)."
    kind: measured
    weight: 2
    signal:
      type: path_count
      globs:
        - "**/.github/workflows/**"
        - "**/CODEOWNERS"
        - "**/.github/CODEOWNERS"
        - "**/PULL_REQUEST_TEMPLATE*"
        - "**/.github/PULL_REQUEST_TEMPLATE*"
      bands:
        - { max_count: 0, value: -0.5 }
        - { max_count: 2, value: 0.2 }
        - { max_count: null, value: 0.6 }
