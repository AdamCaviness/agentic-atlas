id: fresh-vs-mature
title: Fresh vs Mature
poles:
  negative: fresh
  positive: mature
description: >
  How settled the approach is as a project. Negative means new, fast-moving, and
  cutting-edge, with the churn and thin track record that implies. Positive means
  established, stable, and battle-tested, with the inertia that implies. Neither
  pole is better: fresh often means the newest ideas, mature often means fewer
  surprises. This axis leans on deterministic repository facts, so it scores
  meaningfully even with no classified indicators answered.
indicators:
  - id: fm1
    question: "How old is the repository, from its first commit to HEAD?"
    kind: measured
    weight: 2
    signal:
      type: git_stats
      metric: age_days
      bands:
        - { max_count: 180, value: -1.0 }
        - { max_count: 730, value: 0.3 }
        - { max_count: null, value: 1.0 }
  - id: fm2
    question: "How many commits has the repository accumulated?"
    kind: measured
    weight: 2
    signal:
      type: git_stats
      metric: commit_count
      bands:
        - { max_count: 100, value: -1.0 }
        - { max_count: 1000, value: 0.3 }
        - { max_count: null, value: 1.0 }
  - id: fm3
    question: "How many distinct contributors have committed?"
    kind: measured
    weight: 1
    signal:
      type: git_stats
      metric: contributor_count
      bands:
        - { max_count: 2, value: -1.0 }
        - { max_count: 10, value: 0.2 }
        - { max_count: null, value: 1.0 }
  - id: fm4
    question: "How many release tags exist, as a proxy for an established release cadence?"
    kind: measured
    weight: 1
    signal:
      type: git_stats
      metric: tag_count
      bands:
        - { max_count: 0, value: -1.0 }
        - { max_count: 5, value: 0.2 }
        - { max_count: null, value: 1.0 }
  - id: fm5
    question: "How much adoption does the host show, by star count?"
    kind: measured
    weight: 2
    signal:
      type: github_api
      metric: stars
      bands:
        - { max_count: 100, value: -0.8 }
        - { max_count: 2000, value: 0.2 }
        - { max_count: null, value: 1.0 }
  - id: fm6
    question: "How does the project describe its own stability in its docs?"
    kind: classified
    weight: 2
    answers: { experimental: -1.0, evolving: 0.0, stable: 1.0 }
