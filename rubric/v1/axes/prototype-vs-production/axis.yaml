id: prototype-vs-production
title: Prototype vs Production
poles:
  negative: prototype
  positive: production
description: >
  What kind of output the approach optimizes for. Negative means fast, throwaway,
  proof-of-concept output. Positive means production hardening: tests, CI, security,
  and maintainability.
explain:
  negative: fast, throwaway output to prove an idea
  positive: hardened output with tests, CI, security, and maintainability in mind
indicators:
  - id: pp1
    question: "How much emphasis on production hardening (CI, deployment, security, observability)?"
    kind: classified
    weight: 3
    answers: { none: -1.0, some: 0.2, strong: 1.0 }
  - id: pp2
    question: "Is throwaway or vibe output acceptable, or does it insist on maintainable code?"
    kind: classified
    weight: 2
    answers: { throwaway_ok: -1.0, mixed: 0.0, maintainable_only: 1.0 }
  - id: pp3
    question: "Density of production vocabulary across docs and commands."
    kind: measured
    weight: 2
    signal:
      type: vocabulary
      terms: ["production", "deploy", "ci", "security", "observability", "rollback", "monitoring"]
      bands:
        - { max_count: 1, value: -0.8 }
        - { max_count: 8, value: 0.24 }
        - { max_count: null, value: 0.8 }
