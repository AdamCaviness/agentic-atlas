id: greenfield-vs-brownfield
title: Greenfield vs Brownfield
poles:
  negative: greenfield
  positive: brownfield
description: >
  Where the approach is strongest. Negative means it excels starting from an
  idea with no existing product. Positive means it excels working inside an
  existing codebase.
indicators:
  - id: gb1
    question: "Is the first mandatory step generating a spec or PRD from an idea, assuming no product exists yet?"
    kind: classified
    weight: 3
    answers: { "yes": -1.0, partial: -0.5, "no": 0.0 }
  - id: gb2
    question: "Does it ship explicit steps or agents for ingesting and mapping an existing codebase?"
    kind: classified
    weight: 3
    answers: { "yes": 1.0, partial: 0.5, "no": -0.5 }
  - id: gb3
    question: "Density of brownfield vocabulary across docs and commands."
    kind: measured
    weight: 2
    signal:
      type: vocabulary
      terms: ["legacy", "migration", "migrate", "refactor", "existing codebase", "brownfield"]
      bands:
        - { max_count: 0, value: -0.8 }
        - { max_count: 5, value: 0.24 }
        - { max_count: null, value: 0.8 }
  - id: gb4
    question: "Is the default unit of work whole-project generation or a targeted small diff?"
    kind: classified
    weight: 2
    answers: { whole_project: -1.0, mixed: 0.0, small_diff: 1.0 }
  - id: gb5
    question: "Does onboarding assume a brand new repo, or point at an existing one?"
    kind: measured
    weight: 1
    signal:
      type: path_presence
      globs: ["**/brownfield*", "**/*existing*", "**/*legacy*"]
      present: 0.6
      absent: -0.6
