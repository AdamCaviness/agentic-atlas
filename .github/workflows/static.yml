# Deploys the Agentic Atlas static site (the hosted Explorer) to GitHub Pages.
#
# The site is generated by scripts/build_site.py (pure Python 3 standard library, no
# dependencies) which reads profiles/*.json and profiles/*.html and writes the finished
# static site into _bmad-output/site/. That built directory (NOT the repo root) is published.
#
# For the build to work, these must be committed to the repo:
#   - profiles/*.json
#   - profiles/*.html
#   - scripts/build_site.py
#
# This workflow is GATED on CI: it triggers via `workflow_run` only after the CI workflow
# finishes successfully on main, so a build that fails lint, docs sync, corpus sync, or the
# tests never reaches the hosted site. It can also be run manually (workflow_dispatch), which
# bypasses the gate for a deliberate re-deploy.
name: Deploy static content to Pages
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    # Publish only when the gate passed (workflow_run success) or on a deliberate manual run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Deploy exactly the commit that passed CI (falls back to the ref for a manual run).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build site
        run: python3 scripts/build_site.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_bmad-output/site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
