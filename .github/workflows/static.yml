# Deploys the Agentic Atlas static site to GitHub Pages.
#
# The site is generated by scripts/build_site.py (pure Python 3 standard
# library, no dependencies) which reads profiles/*.json and profiles/*.html
# and writes the finished static site into _bmad-output/site/. That built
# directory (NOT the repo root) is what gets published.
#
# For the build to work, these must be committed to the repo:
#   - profiles/*.json
#   - profiles/*.html
#   - scripts/build_site.py
#
# This workflow triggers on every push to `main` (and can be run manually).
name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build site
        run: python3 scripts/build_site.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_bmad-output/site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
